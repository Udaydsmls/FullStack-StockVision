program: sweep_agent.py
method: bayes
metric:
  name: val_mae
  goal: minimize
parameters:
  ticker:
    value: AAPL
  model:
    values: [lstm, bilstm, gru, cnn_lstm, transformer, tcn, linear]
  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01
  batch_size:
    values: [16, 32, 64]
  epochs:
    values: [15, 25, 40]
  window:
    values: [20, 30, 60]
early_terminate:
  type: hyperband
  min_iter: 5
