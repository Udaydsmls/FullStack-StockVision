version: "3.8"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.03-py3
    container_name: stockvision-triton
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=false
      --log-verbose=1
    ports:
      - "8000:8000"  # HTTP
      - "8001:8001"  # gRPC
      - "8002:8002"  # metrics
    volumes:
      - ./model_repository:/models:ro
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: "2gb"
